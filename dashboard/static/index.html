<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Healing Claude Framework — Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Header -->
    <header id="header">
        <div class="header-left">
            <div id="health-bar-mini" class="health-bar-mini" title="Framework Health">
                <div class="bar-fill" id="header-bar-fill"></div>
            </div>
            <span id="header-hp" class="header-hp">HP: --</span>
            <span id="header-project" class="header-project">loading...</span>
        </div>
        <div class="header-right">
            <span id="live-indicator" class="live-dot off" title="SSE Connection">&#9679;</span>
            <span id="header-session" class="header-session" title="Session count">S:--</span>
            <label class="auto-refresh-toggle" title="Auto-refresh panels every 30s">
                <input type="checkbox" id="auto-refresh-cb" checked>
                Auto
            </label>
        </div>
    </header>

    <!-- Main grid -->
    <main class="dashboard-grid">
        <!-- Row 1: Health + Gates -->
        <section class="card" id="panel-health">
            <h2>Health Overview</h2>
            <div id="health-content" class="panel-body">
                <div class="loading">Loading...</div>
            </div>
        </section>

        <section class="card" id="panel-gates">
            <h2>Gate Statistics
                <select id="gate-date-select" class="inline-select">
                    <option value="">Today</option>
                </select>
            </h2>
            <div id="gates-content" class="panel-body">
                <div class="loading">Loading...</div>
            </div>
        </section>

        <!-- Row 2: Timeline (full width) -->
        <section class="card full-width" id="panel-timeline">
            <h2>Session Timeline
                <select id="timeline-date-select" class="inline-select">
                    <option value="">Today</option>
                </select>
                <span id="timeline-count" class="badge">0</span>
            </h2>
            <div id="timeline-content" class="panel-body timeline-scroll">
                <div class="loading">Loading...</div>
            </div>
        </section>

        <!-- Row 3: Memory + Errors -->
        <section class="card" id="panel-memory">
            <h2>Memory Browser
                <span id="memory-total" class="badge">0</span>
            </h2>
            <div class="search-bar">
                <input type="text" id="memory-search" placeholder="Search memories..." autocomplete="off">
                <button id="memory-search-btn" class="btn-sm">Search</button>
            </div>
            <div id="memory-tags" class="tag-cloud"></div>
            <div id="memory-content" class="panel-body memory-scroll">
                <div class="loading">Loading...</div>
            </div>
        </section>

        <section class="card" id="panel-errors">
            <h2>Error Patterns</h2>
            <div id="errors-content" class="panel-body">
                <div class="loading">Loading...</div>
            </div>
        </section>

        <!-- Row 4: Components + History -->
        <section class="card" id="panel-components">
            <h2>Component Inventory</h2>
            <div class="tab-bar" id="component-tabs">
                <button class="tab active" data-tab="gates">Gates</button>
                <button class="tab" data-tab="hooks">Hooks</button>
                <button class="tab" data-tab="agents">Agents</button>
                <button class="tab" data-tab="plugins">Plugins</button>
            </div>
            <div id="components-content" class="panel-body component-scroll">
                <div class="loading">Loading...</div>
            </div>
        </section>

        <section class="card" id="panel-history">
            <h2>Session History
                <span id="history-count" class="badge">0</span>
            </h2>
            <div id="history-content" class="panel-body history-scroll">
                <div class="loading">Loading...</div>
            </div>
        </section>
    </main>

    <!-- Expandable detail overlay -->
    <div id="detail-overlay" class="overlay hidden">
        <div class="overlay-content">
            <button class="overlay-close" id="overlay-close">&times;</button>
            <h3 id="overlay-title">Detail</h3>
            <pre id="overlay-body"></pre>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
