[service]
port = 18800
host = "127.0.0.1"
default_timeout = 15
max_concurrent = 17

[judge]
provider = "anthropic"
model = "claude-sonnet-4-5-20250929"
api_key_env = "ANTHROPIC_API_KEY"

[memory]
enabled = true
results_dir = "~/data/model-router/results"

# Add models below. Each model needs:
#   id       = "provider/model-name:free"
#   api_key  = "sk-or-v1-..."   # Get from https://openrouter.ai/keys
#   reasoning = true/false
#   vision   = true/false

